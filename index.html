<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="intro" aria-label="Page title">
            <h1>css only</h1>      
        <p>using hover and not hover</p>
        </section>
        <div class="banner">
            <div class="list" aria-label="Character gallery">
                <button class="item" type="button" data-glow="#ff4d6d"><img src="sukun-Photoroom.png" alt="Sukuna character"></button>
                <button class="item is-active" type="button" data-glow="#8be9fd"><img src="gojobody.png" alt="Gojo character full body"></button>
                <button class="item" type="button" data-glow="#7c3aed"><img src="gojo.png" alt="Gojo character portrait"></button>
                <button class="item" type="button" data-glow="#22c55e"><img src="geto.png" alt="Geto character"></button>

            </div>
        </div>
    </main>
    <div class="cursor-light" aria-hidden="true"></div>
    <script src="script.js"></script>
</body>
</html>
